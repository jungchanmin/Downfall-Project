name: Project Governance

on:
  pull_request:
    paths:
      - 'Wiki/**'
      - 'Scripts/**'
      - 'tools/**'
      - 'docs/**'
      - '.github/workflows/**'
      - 'PROJECT_MANIFEST.md'
  push:
    branches:
      - main
      - 'ai/**'
    paths:
      - 'Wiki/**'
      - 'Scripts/**'
      - 'tools/**'
      - 'docs/**'
      - '.github/workflows/**'
      - 'PROJECT_MANIFEST.md'
  workflow_dispatch:

concurrency:
  group: project-governance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate Wiki frontmatter
        id: wiki_frontmatter
        continue-on-error: true
        run: python tools/wiki/build_index.py --check

      - name: Validate Wiki references
        id: wiki_references
        continue-on-error: true
        run: python tools/qa/lint_wiki_refs.py

      - name: Generate repository manifest
        run: python tools/repository/build_manifest.py

      - name: Show generated manifest diff
        run: git diff -- PROJECT_MANIFEST.md || true

      - name: Commit generated manifest on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "project-governance-bot"
          git config user.email "project-governance-bot@users.noreply.github.com"

          if [[ -n "$(git status --porcelain PROJECT_MANIFEST.md)" ]]; then
            git add PROJECT_MANIFEST.md
            git commit -m "chore(repository): refresh project manifest [skip ci]"
            git push
            echo "Manifest refreshed and pushed on main."
          else
            echo "Manifest is already current."
          fi

      - name: Report stale manifest in pull requests
        if: github.event_name == 'pull_request'
        run: |
          if [[ -n "$(git status --porcelain PROJECT_MANIFEST.md)" ]]; then
            echo "::warning::PROJECT_MANIFEST.md is stale and will be refreshed after merge to main."
          else
            echo "PROJECT_MANIFEST.md is current."
          fi

      - name: Fail on Wiki validation errors
        if: always()
        run: |
          failed=0
          if [[ "${{ steps.wiki_frontmatter.outcome }}" != "success" ]]; then
            echo "Wiki frontmatter validation failed."
            failed=1
          fi
          if [[ "${{ steps.wiki_references.outcome }}" != "success" ]]; then
            echo "Wiki reference validation failed."
            failed=1
          fi
          exit "$failed"
