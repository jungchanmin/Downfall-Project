name: Build Wiki Index

# 트리거: Wiki 폴더나 빌드 스크립트가 변경될 때마다 실행
# 또한 Actions 탭에서 수동 실행도 가능 (workflow_dispatch)
on:
  push:
    branches: [main]
    paths:
      - 'Wiki/**'
      - 'tools/wiki/**'
      - '.github/workflows/build-wiki-index.yml'
  workflow_dispatch:

# 봇이 인덱스를 커밋·푸시할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN 으로 푸시 가능
          token: ${{ secrets.GITHUB_TOKEN }}
          # 봇이 만든 커밋 위에 다시 푸시할 수 있도록 fetch-depth 0
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build wiki index
        run: python tools/wiki/build_index.py --verbose

      - name: Commit & push updated index
        run: |
          git config user.name  "wiki-bot"
          git config user.email "wiki-bot@users.noreply.github.com"

          # 변경 사항이 있을 때만 커밋
          if [[ -n "$(git status --porcelain Wiki/00_System/Wiki_Index.md)" ]]; then
            git add Wiki/00_System/Wiki_Index.md
            # [skip ci] 태그로 무한 루프 방지
            git commit -m "chore(wiki): auto-update index [skip ci]"
            git push
            echo "✅ Index updated and pushed."
          else
            echo "ℹ️  No index changes — nothing to commit."
          fi
